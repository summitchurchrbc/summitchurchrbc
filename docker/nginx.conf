server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /_next/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /live-status.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        alias /var/live-status/live-status.json;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # WordPress slug redirects
    location = /services-3 { return 301 /services/; }
    location = /services-3/ { return 301 /services/; }
    location = /contact-2 { return 301 /contact/; }
    location = /contact-2/ { return 301 /contact/; }
    location = /picture-gallery { return 301 /; }
    location = /picture-gallery/ { return 301 /; }
    location = /gallery { return 301 /; }
    location = /gallery/ { return 301 /; }
    location = /service-times-location { return 301 /service-times/; }
    location = /service-times-location/ { return 301 /service-times/; }
    location ~ ^/aiovg_videos/ { return 301 /services/; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}